<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Marks Calculator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Student Marks Calculator - SCM Project v1.0">
</head>
<body>
  <div class="container">
    <h1>Student Marks Calculator</h1>
    <p class="subtitle">Enter marks out of 100 for each subject</p>

    <div class="form-group">
      <label>Student Name</label>
      <input type="text" id="studentName" placeholder="Enter student name">
    </div>
    <div class="form-group">
      <label>Mathematics</label>
      <input type="number" id="math" placeholder="0-100" min="0" max="100">
    </div>
    <div class="form-group">
      <label>Science</label>
      <input type="number" id="science" placeholder="0-100" min="0" max="100">
    </div>
    <div class="form-group">
      <label>English</label>
      <input type="number" id="english" placeholder="0-100" min="0" max="100">
    </div>
    <div class="form-group">
      <label>Computer Science</label>
      <input type="number" id="cs" placeholder="0-100" min="0" max="100">
    </div>
    <div class="form-group">
      <label>Software Engineering</label>
      <input type="number" id="se" placeholder="0-100" min="0" max="100">
    </div>

    <button onclick="calculateResult()">Calculate Result</button>

    <div class="result" id="result" style="display:none;"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
